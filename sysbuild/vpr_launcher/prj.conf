# Core Bluetooth
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_NUS=y

# Core ADC
CONFIG_ADC=y
CONFIG_ADC_NRFX_SAADC=y

# Console Output
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y

# GPIO 
CONFIG_GPIO=y

# Forcing the name GaitSync
CONFIG_BT_DEVICE_NAME="GaitSync"
CONFIG_BT_FIXED_DEVICE_NAME=y
CONFIG_BT_DEVICE_NAME_DYNAMIC=n