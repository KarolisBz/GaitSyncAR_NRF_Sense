# --- Bluetooth Core ---
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_NUS=y

# --- Forcing name on ble
CONFIG_BT_DEVICE_NAME="GaitSync"
CONFIG_BT_SETTINGS=n
CONFIG_BT_DEVICE_NAME_DYNAMIC=n

# --- Hardware Drivers ---
CONFIG_ADC=y
CONFIG_ADC_NRFX_SAADC=y
CONFIG_GPIO=y

# --- Console ---
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y